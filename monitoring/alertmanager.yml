---
# Omniphi Validator — AlertManager Configuration
# Deploy to: /etc/alertmanager/alertmanager.yml
# Reload: amtool check-config alertmanager.yml && systemctl reload alertmanager

global:
  # How long to wait before sending a notification for a group of alerts.
  resolve_timeout: 5m

  # SMTP settings for email fallback (optional).
  # smtp_smarthost: "smtp.example.com:587"
  # smtp_from: "alertmanager@omniphi.network"
  # smtp_auth_username: "alertmanager@omniphi.network"
  # smtp_auth_password: "<SMTP_PASSWORD>"
  # smtp_require_tls: true

  # PagerDuty global settings.
  pagerduty_url: "https://events.pagerduty.com/v2/enqueue"

  # Slack global settings.
  slack_api_url: "https://hooks.slack.com/services/PLACEHOLDER/PLACEHOLDER/PLACEHOLDER"

# =============================================================================
# Templates
# =============================================================================
templates:
  - "/etc/alertmanager/templates/*.tmpl"

# =============================================================================
# Inhibition Rules
# =============================================================================
# Prevent warning alerts from firing when a critical alert exists for the
# same component. This reduces noise during major incidents.
inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal:
      - chain
      - component

  # If the chain is halted, suppress individual validator signing alerts.
  - source_matchers:
      - alertname = "ChainHalted"
    target_matchers:
      - alertname = "ValidatorNotSigning"
    equal:
      - chain

  - source_matchers:
      - alertname = "ChainHalted"
    target_matchers:
      - alertname = "MissedBlocks"
    equal:
      - chain

# =============================================================================
# Routing Tree
# =============================================================================
route:
  # Default receiver for anything that doesn't match a child route.
  receiver: slack-warnings

  # Group alerts by these labels. Alerts with the same group key are batched.
  group_by:
    - alertname
    - chain
    - component

  # Wait this long to buffer alerts before sending the first notification.
  group_wait: 30s

  # Wait this long before sending updated notifications for an existing group.
  group_interval: 5m

  # Wait this long before resending a notification that has already been sent.
  repeat_interval: 4h

  # Child routes — evaluated top-to-bottom, first match wins.
  routes:
    # -------------------------------------------------------------------------
    # Critical alerts → PagerDuty (immediate page)
    # -------------------------------------------------------------------------
    - matchers:
        - severity = "critical"
      receiver: pagerduty-critical
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h
      continue: false

    # -------------------------------------------------------------------------
    # Warning alerts → Slack channel
    # -------------------------------------------------------------------------
    - matchers:
        - severity = "warning"
      receiver: slack-warnings
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      continue: false

    # -------------------------------------------------------------------------
    # Info alerts → null receiver (logged only, no notification)
    # -------------------------------------------------------------------------
    - matchers:
        - severity = "info"
      receiver: "null"
      continue: false

# =============================================================================
# Receivers
# =============================================================================
receivers:
  # ---------------------------------------------------------------------------
  # PagerDuty — Critical Alerts
  # ---------------------------------------------------------------------------
  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key: "PLACEHOLDER_PAGERDUTY_ROUTING_KEY"
        severity: "critical"
        description: >-
          {{ .GroupLabels.alertname }} on {{ .GroupLabels.chain }}
          ({{ .GroupLabels.component }})
        details:
          firing: "{{ .Alerts.Firing | len }}"
          resolved: "{{ .Alerts.Resolved | len }}"
          summary: "{{ range .Alerts.Firing }}{{ .Annotations.summary }} {{ end }}"
        # Deduplicate by group key to prevent alert storms.
        group: "{{ .GroupLabels.chain }}-{{ .GroupLabels.alertname }}"
        # Auto-resolve in PagerDuty when Prometheus resolves.
        send_resolved: true

  # ---------------------------------------------------------------------------
  # Slack — Warning Alerts
  # ---------------------------------------------------------------------------
  - name: slack-warnings
    slack_configs:
      - channel: "#omniphi-alerts"
        send_resolved: true
        username: "Omniphi AlertManager"
        icon_url: "https://raw.githubusercontent.com/cometbft/cometbft/main/docs/imgs/logo.png"
        title: >-
          [{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}
        text: >-
          *Chain:* {{ .GroupLabels.chain }}

          *Component:* {{ .GroupLabels.component }}

          *Severity:* {{ .CommonLabels.severity }}

          {{ range .Alerts.Firing }}
          *Alert:* {{ .Annotations.summary }}

          {{ .Annotations.description }}
          ---
          {{ end }}
          {{ if .Alerts.Resolved }}
          *Resolved:*
          {{ range .Alerts.Resolved }}
          {{ .Annotations.summary }}
          {{ end }}
          {{ end }}
        actions:
          - type: button
            text: "View in Grafana"
            url: "http://localhost:3000/d/omniphi-validator"
          - type: button
            text: "Runbook"
            url: "https://docs.omniphi.network/runbook"

  # ---------------------------------------------------------------------------
  # Null — Info Alerts (logged only, no external notification)
  # ---------------------------------------------------------------------------
  - name: "null"
