syntax = "proto3";

package pos.repgov.module.v1;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "pos/proto/pos/repgov/module/v1";

// Module is the config object for the repgov module.
message Module {
  option (cosmos.app.v1alpha1.module) = {
    go_import: "pos/x/repgov"
  };
}
