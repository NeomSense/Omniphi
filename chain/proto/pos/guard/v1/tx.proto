syntax = "proto3";
package pos.guard.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "pos/guard/v1/params.proto";

option go_package = "pos/x/guard/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a governance operation for updating the x/guard module parameters.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // ConfirmExecution confirms execution for a CRITICAL proposal requiring second confirmation
  rpc ConfirmExecution(MsgConfirmExecution) returns (MsgConfirmExecutionResponse);

  // UpdateAIModel updates the AI model configuration (Layer 2)
  rpc UpdateAIModel(MsgUpdateAIModel) returns (MsgUpdateAIModelResponse);

  // SubmitAdvisoryLink submits an advisory report link (Layer 3)
  rpc SubmitAdvisoryLink(MsgSubmitAdvisoryLink) returns (MsgSubmitAdvisoryLinkResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "pos/x/guard/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the x/guard parameters to update.
  Params params = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// MsgUpdateParamsResponse defines the response structure for executing a MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgConfirmExecution confirms execution of a CRITICAL proposal
message MsgConfirmExecution {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "pos/x/guard/MsgConfirmExecution";

  // authority is the address authorized to confirm (governance module authority)
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // proposal_id is the ID of the proposal to confirm
  uint64 proposal_id = 2;

  // justification for the confirmation
  string justification = 3;
}

// MsgConfirmExecutionResponse defines the response for MsgConfirmExecution
message MsgConfirmExecutionResponse {}

// MsgUpdateAIModel updates the AI model configuration (Layer 2)
message MsgUpdateAIModel {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "pos/x/guard/MsgUpdateAIModel";

  // authority is the address that controls the module
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // model_version identifies the model (e.g., "logistic-v1")
  string model_version = 2;

  // weights are INT32 fixed-point weights (divided by scale)
  repeated int32 weights = 3;

  // bias is INT32 fixed-point bias (divided by scale)
  int32 bias = 4;

  // scale is the fixed-point scale for weights and bias (e.g., 10000)
  int32 scale = 5;

  // feature_schema_hash must match current schema
  string feature_schema_hash = 6;

  // activated_height is the block height when model becomes active (0 = immediately)
  int64 activated_height = 7;
}

// MsgUpdateAIModelResponse defines the response for MsgUpdateAIModel
message MsgUpdateAIModelResponse {}

// MsgSubmitAdvisoryLink submits an advisory report link (Layer 3)
message MsgSubmitAdvisoryLink {
  option (cosmos.msg.v1.signer) = "reporter";
  option (amino.name) = "pos/x/guard/MsgSubmitAdvisoryLink";

  // reporter is the address submitting the advisory link
  string reporter = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // proposal_id is the governance proposal ID
  uint64 proposal_id = 2;

  // uri is the IPFS CID or HTTP URI to the advisory report
  string uri = 3;

  // report_hash is the SHA256 hex of the report bytes for verification
  string report_hash = 4;
}

// MsgSubmitAdvisoryLinkResponse defines the response for MsgSubmitAdvisoryLink
message MsgSubmitAdvisoryLinkResponse {}
